services:
  db:
    image: pgvector/pgvector:pg16-trixie
    container_name: project3-db
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    volumes:
      - vector_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: project3-api
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"

    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - db
    
  train:
    build:
      context: .
      dockerfile: ml/Dockerfile
    container_name: project3-train
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  insert:
    build:
      context: .
      dockerfile: rag/Dockerfile
    container_name: project3-insert-data
    environment:
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
    depends_on:
      - db
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL}"
    container_name: project3-frontend
    ports: 
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - api

  retrain:
    build:
      context: .
      dockerfile: retrain/Dockerfile
    container_name: project3-retrain
    environment:
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - ./data:/app/data
    depends_on:
      - db




volumes:
  vector_data: